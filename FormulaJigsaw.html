<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ionic Bonding Jigsaw Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --cation-color: #3b82f6;
            --anion-color: #ef4444;
        }

        body {
            touch-action: none;
            overflow: hidden;
            background-color: #f8fafc;
            user-select: none;
        }

        .ion-piece {
            position: absolute;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
            z-index: 50;
            transition: filter 0.2s;
        }

        .ion-piece.snapped {
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.6));
        }

        .ion-piece:active {
            cursor: grabbing;
            z-index: 1000 !important;
        }

        .svg-piece {
            pointer-events: none;
            display: block;
        }

        .canvas-area {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .sidebar {
            width: 200px;
            overflow-y: auto;
            background: white;
            z-index: 10;
        }

        .chem-formula sub {
            font-size: 0.5em;
            vertical-align: sub;
            line-height: 0;
        }
        
        .scale-in {
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen flex flex-col font-sans text-slate-900">

    <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-500 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight leading-none">Ionic Lab</h1>
                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest mt-1">Neutralize the Charge</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="clearCanvas()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-xs transition font-semibold">Reset</button>
            <button onclick="checkBonding()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-bold transition shadow-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">Check Balance</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="sidebar p-3 flex flex-col gap-3 border-r border-slate-200">
            <h2 class="font-black text-blue-600 text-center border-b border-blue-50 pb-2 uppercase text-[10px] tracking-widest">Cations (+)</h2>
            <div id="cations-bench" class="space-y-3"></div>
        </aside>

        <main id="canvas" class="flex-1 relative canvas-area overflow-hidden bg-slate-50">
            <div id="instruction-overlay" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-20 transition-opacity duration-500">
                <p class="text-2xl font-black italic">CONSTRUCT A COMPOUND</p>
                <p class="text-sm font-medium">Stack ions vertically and connect horizontally</p>
            </div>
        </main>

        <aside class="sidebar p-3 flex flex-col gap-3 border-l border-slate-200">
            <h2 class="font-black text-red-600 text-center border-b border-red-50 pb-2 uppercase text-[10px] tracking-widest">Anions (-)</h2>
            <div id="anions-bench" class="space-y-3"></div>
        </aside>
    </div>

    <div id="formula-modal" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center z-[2000] p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-10 text-center border border-slate-100 scale-in">
            <div id="modal-icon" class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h3 id="modal-status" class="text-slate-400 uppercase tracking-[0.2em] text-[10px] font-black mb-2">Neutral Compound Formed</h3>
            <div id="compound-name" class="text-3xl font-extrabold text-slate-800 mb-2"></div>
            <div id="compound-formula" class="text-6xl font-serif text-blue-600 mb-10 chem-formula tracking-tight"></div>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg">Continue Lab</button>
        </div>
    </div>

    <script>
        const cations = [
            { id: 'nh4', name: 'Ammonium', symbol: 'NH₄', charge: 1, poly: true },
            { id: 'li', name: 'Lithium', symbol: 'Li', charge: 1 },
            { id: 'na', name: 'Sodium', symbol: 'Na', charge: 1 },
            { id: 'k', name: 'Potassium', symbol: 'K', charge: 1 },
            { id: 'ca', name: 'Calcium', symbol: 'Ca', charge: 2 },
            { id: 'mg', name: 'Magnesium', symbol: 'Mg', charge: 2 },
            { id: 'zn', name: 'Zinc', symbol: 'Zn', charge: 2 },
            { id: 'fe2', name: 'Iron(II)', symbol: 'Fe', charge: 2 },
            { id: 'cu2', name: 'Copper(II)', symbol: 'Cu', charge: 2 },
            { id: 'al', name: 'Aluminium', symbol: 'Al', charge: 3 },
            { id: 'fe3', name: 'Iron(III)', symbol: 'Fe', charge: 3 }
        ];

        const anions = [
            { id: 'cl', name: 'Chloride', symbol: 'Cl', charge: 1 },
            { id: 'no3', name: 'Nitrate', symbol: 'NO₃', charge: 1, poly: true },
            { id: 'oh', name: 'Hydroxide', symbol: 'OH', charge: 1, poly: true },
            { id: 'o', name: 'Oxide', symbol: 'O', charge: 2 },
            { id: 's', name: 'Sulfide', symbol: 'S', charge: 2 },
            { id: 'so4', name: 'Sulfate', symbol: 'SO₄', charge: 2, poly: true },
            { id: 'co3', name: 'Carbonate', symbol: 'CO₃', charge: 2, poly: true },
            { id: 'n', name: 'Nitride', symbol: 'N', charge: 3 },
            { id: 'po4', name: 'Phosphate', symbol: 'PO₄', charge: 3, poly: true }
        ];

        let activePieces = [];
        let draggedElement = null;
        let startX, startY, initialX, initialY;

        function init() {
            renderBench('cations-bench', cations, 'cation');
            renderBench('anions-bench', anions, 'anion');
            window.addEventListener('mousemove', handleDrag);
            window.addEventListener('mouseup', endDrag);
            window.addEventListener('touchmove', handleDrag, { passive: false });
            window.addEventListener('touchend', endDrag);
        }

        function createPieceSVG(type, charge, symbol) {
            const width = 80;
            const height = charge * 45;
            const holeRadius = 14;
            const color = type === 'cation' ? '#3b82f6' : '#ef4444';
            const sign = type === 'cation' ? '+' : '-';
            const chargeText = charge > 1 ? `${charge}${sign}` : sign;
            
            let svg = `<svg width="${width + 20}" height="${height}" viewBox="0 0 ${width + 20} ${height}" class="svg-piece" xmlns="http://www.w3.org/2000/svg">`;
            
            if (type === 'cation') {
                let d = `M 0 0 H ${width} `;
                for(let i=0; i<charge; i++) {
                    const y = i * 45 + 22.5;
                    d += `V ${y-holeRadius} A ${holeRadius} ${holeRadius} 0 0 0 ${width} ${y+holeRadius} `;
                }
                d += `V ${height} H 0 Z`;
                svg += `<path d="${d}" fill="${color}" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>`;
            } else {
                let d = `M 20 0 H ${width+20} V ${height} H 20 `;
                for(let i=charge-1; i>=0; i--) {
                    const y = i * 45 + 22.5;
                    d += `V ${y+holeRadius} A ${holeRadius} ${holeRadius} 0 0 1 20 ${y-holeRadius} `;
                }
                d += `Z`;
                svg += `<path d="${d}" fill="${color}" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>`;
            }

            const centerX = type === 'cation' ? width/2 : width/2 + 20;
            const centerY = height/2;
            svg += `<text x="${centerX - 6}" y="${centerY + 7}" text-anchor="middle" fill="white" font-weight="900" font-size="20" font-family="serif">${symbol}</text>`;
            svg += `<text x="${centerX + (symbol.length > 2 ? 16 : 12)}" y="${centerY - 4}" text-anchor="start" fill="white" fill-opacity="0.8" font-weight="bold" font-size="12" font-family="sans-serif">${chargeText}</text>`;
            svg += `</svg>`;
            return svg;
        }

        function renderBench(id, list, type) {
            const bench = document.getElementById(id);
            list.forEach(ion => {
                const item = document.createElement('div');
                item.className = 'flex flex-col items-center p-2 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-all active:scale-95 bg-white';
                item.innerHTML = `
                    <div class="mb-1 pointer-events-none">${createPieceSVG(type, ion.charge, ion.symbol)}</div>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-tight">${ion.name}</span>
                `;
                item.addEventListener('mousedown', (e) => startSpawn(e, ion, type));
                item.addEventListener('touchstart', (e) => startSpawn(e, ion, type), { passive: false });
                bench.appendChild(item);
            });
        }

        function startSpawn(e, ion, type) {
            if (e.cancelable) e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const piece = document.createElement('div');
            piece.className = 'ion-piece';
            piece.dataset.type = type;
            piece.dataset.charge = ion.charge;
            piece.dataset.symbol = ion.symbol;
            piece.dataset.name = ion.name;
            piece.dataset.id = ion.id;
            piece.dataset.poly = ion.poly || false;
            piece.innerHTML = createPieceSVG(type, ion.charge, ion.symbol);
            
            const canvas = document.getElementById('canvas');
            canvas.appendChild(piece);
            const canvasRect = canvas.getBoundingClientRect();
            
            initialX = clientX - canvasRect.left - 50;
            initialY = clientY - canvasRect.top - (ion.charge * 45 / 2);
            
            piece.style.left = `${initialX}px`;
            piece.style.top = `${initialY}px`;
            
            draggedElement = piece;
            startX = clientX;
            startY = clientY;
            activePieces.push(piece);
            document.getElementById('instruction-overlay').style.opacity = '0';

            piece.addEventListener('mousedown', (e) => startExistingDrag(e, piece));
            piece.addEventListener('touchstart', (e) => startExistingDrag(e, piece), { passive: false });
        }

        function startExistingDrag(e, piece) {
            if (e.cancelable) e.preventDefault();
            e.stopPropagation();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            draggedElement = piece;
            startX = clientX;
            startY = clientY;
            initialX = parseFloat(piece.style.left);
            initialY = parseFloat(piece.style.top);
            piece.parentElement.appendChild(piece);
        }

        function handleDrag(e) {
            if (!draggedElement) return;
            if (e.cancelable) e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const dx = clientX - startX;
            const dy = clientY - startY;

            draggedElement.style.left = `${initialX + dx}px`;
            draggedElement.style.top = `${initialY + dy}px`;

            snapToOthers(draggedElement);
        }

        function snapToOthers(el) {
            const snapThreshold = 30;
            let currentSnapped = false;

            for (let other of activePieces) {
                if (other === el) continue;
                
                const elType = el.dataset.type;
                const otherType = other.dataset.type;
                const elL = parseFloat(el.style.left);
                const elT = parseFloat(el.style.top);
                const otL = parseFloat(other.style.left);
                const otT = parseFloat(other.style.top);
                const otH = parseInt(other.dataset.charge) * 45;
                const elH = parseInt(el.dataset.charge) * 45;

                // Horizontal snap
                if (elType !== otherType) {
                    const cationX = elType === 'cation' ? elL : otL;
                    const anionX = elType === 'anion' ? elL : otL;
                    const hGap = Math.abs((cationX + 60) - anionX);
                    const vDiff = Math.abs(elT - otT);

                    if (hGap < snapThreshold && vDiff < snapThreshold) {
                        el.style.left = elType === 'cation' ? `${otL - 60}px` : `${otL + 60}px`;
                        el.style.top = `${otT}px`;
                        currentSnapped = true;
                    }
                }

                // Vertical snap
                if (elType === otherType) {
                    const hDiff = Math.abs(elL - otL);
                    const vGapBelow = Math.abs(elT - (otT + otH));
                    const vGapAbove = Math.abs((elT + elH) - otT);

                    if (hDiff < 15) {
                        if (vGapBelow < snapThreshold) {
                            el.style.top = `${otT + otH}px`;
                            el.style.left = `${otL}px`;
                            currentSnapped = true;
                        } else if (vGapAbove < snapThreshold) {
                            el.style.top = `${otT - elH}px`;
                            el.style.left = `${otL}px`;
                            currentSnapped = true;
                        }
                    }
                }
            }
            el.classList.toggle('snapped', currentSnapped);
        }

        function endDrag() {
            draggedElement = null;
        }

        function clearCanvas() {
            activePieces.forEach(p => p.remove());
            activePieces = [];
            document.getElementById('instruction-overlay').style.opacity = '0.2';
        }

        function checkBonding() {
            if (activePieces.length === 0) return;

            const clusters = [];
            const visited = new Set();

            activePieces.forEach((piece, index) => {
                if (visited.has(index)) return;
                
                const cluster = [];
                const queue = [index];
                visited.add(index);

                while(queue.length > 0) {
                    const currIdx = queue.shift();
                    cluster.push(activePieces[currIdx]);

                    activePieces.forEach((other, otherIdx) => {
                        if (visited.has(otherIdx)) return;
                        const r1 = activePieces[currIdx].getBoundingClientRect();
                        const r2 = other.getBoundingClientRect();
                        const touching = !(r2.left > r1.right + 5 || r2.right < r1.left - 5 || r2.top > r1.bottom + 5 || r2.bottom < r1.top - 5);
                        if (touching) {
                            visited.add(otherIdx);
                            queue.push(otherIdx);
                        }
                    });
                }
                clusters.push(cluster);
            });

            let allValid = true;
            let totalCations = 0, totalAnions = 0;
            let cationRef = null, anionRef = null;

            clusters.forEach(cluster => {
                let clusterPos = 0, clusterNeg = 0;
                cluster.forEach(p => {
                    if (p.dataset.type === 'cation') {
                        clusterPos += parseInt(p.dataset.charge);
                        totalCations++;
                        cationRef = p.dataset;
                    } else {
                        clusterNeg += parseInt(p.dataset.charge);
                        totalAnions++;
                        anionRef = p.dataset;
                    }
                });
                if (clusterPos !== clusterNeg || clusterPos === 0) allValid = false;
            });

            if (!allValid || clusters.length === 0) {
                const totalP = activePieces.reduce((acc, p) => acc + (p.dataset.type === 'cation' ? parseInt(p.dataset.charge) : 0), 0);
                const totalN = activePieces.reduce((acc, p) => acc + (p.dataset.type === 'anion' ? parseInt(p.dataset.charge) : 0), 0);
                const diff = totalP - totalN;
                showMessage(diff > 0 ? `Unbalanced: Needs ${diff} more (-) charge.` : (diff < 0 ? `Unbalanced: Needs ${Math.abs(diff)} more (+) charge.` : "Ensure all pieces are connected!"));
                return;
            }

            if (!cationRef || !anionRef) {
                showMessage("Bonding requires both metal/polyatomic cations and anions.");
                return;
            }

            const gcd = (a, b) => b ? gcd(b, a % b) : a;
            const common = gcd(totalCations, totalAnions);
            generateFormula(cationRef, anionRef, totalCations / common, totalAnions / common);
        }

        function formatSymbol(sym) {
            return sym.replace(/([0-9]+)/g, '<sub>$1</sub>');
        }

        function generateFormula(cat, ani, nCat, nAni) {
            let formulaHtml = "";
            
            // Cation portion
            if (cat.poly === "true" && nCat > 1) {
                formulaHtml += `(${formatSymbol(cat.symbol)})<sub>${nCat}</sub>`;
            } else {
                formulaHtml += formatSymbol(cat.symbol) + (nCat > 1 ? `<sub>${nCat}</sub>` : '');
            }

            // Anion portion
            if (ani.poly === "true" && nAni > 1) {
                formulaHtml += `(${formatSymbol(ani.symbol)})<sub>${nAni}</sub>`;
            } else {
                formulaHtml += formatSymbol(ani.symbol) + (nAni > 1 ? `<sub>${nAni}</sub>` : '');
            }

            document.getElementById('compound-name').innerText = `${cat.name} ${ani.name}`;
            document.getElementById('compound-formula').innerHTML = formulaHtml;
            document.getElementById('formula-modal').style.display = 'flex';
        }

        function showMessage(msg) {
            const t = document.createElement('div');
            t.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[3000] font-bold border-t-4 border-red-500 scale-in';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        function closeModal() { document.getElementById('formula-modal').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
